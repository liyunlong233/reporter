name: "release"

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  flutter-build-android:
    name: "Release for android"
    runs-on: "ubuntu-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Verify Flutter environment
        run: flutter doctor

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Build Flutter for Android
        run: flutter build apk --split-per-abi
        shell: bash

      - name: Package android build output
        run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Reporter_android_${{ github.ref_name }}.apk
        shell: bash

      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: android_outputs
          path: Reporter_android_*.apk

  flutter-build-ios:
    name: "Release for iOS"
    runs-on: "macos-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Verify Flutter environment
        run: flutter doctor

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build iOS Frameworks (No Codesign)
        run: flutter build ios --release --no-codesign || exit 1

      - name: Check Runner.app exists
        run: |
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "❌ Error: Runner.app not found after build!"
            exit 1
          fi

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -q -r Reporter_ios_${{ github.ref_name }}_no_sign.ipa Payload
          rm -rf Payload

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios_outputs
          path: Reporter_ios_*.ipa

  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    needs: [flutter-build-android, flutter-build-ios] 
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.apk
            ./artifacts/*.ipa
