name: "release"

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"

jobs:
  flutter-build-android:
    name: "Release for android"
    runs-on: "ubuntu-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
        shell: bash

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Verify Flutter environment
        run: flutter doctor

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Run Flutter analyzer
        run: flutter analyze --no-fatal-infos
        shell: bash

      - name: Clean build artifacts
        run: flutter clean
        shell: bash

      - name: Build Flutter for Android
        run: flutter build apk --split-per-abi
        shell: bash

      - name: Package android build output
        run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Reporter_android_${{ github.ref_name }}.apk
        shell: bash

      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: android_outputs
          path: Reporter_android_*.apk

  flutter-build-ios:
    name: "Release for iOS"
    runs-on: "macos-latest"
    permissions: write-all
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Verify Flutter environment
        run: flutter doctor

      - name: Get Flutter dependencies
        run: flutter pub get
        shell: bash

      - name: Run Flutter analyzer
        run: flutter analyze --no-fatal-infos
        shell: bash

      - name: Clean build artifacts
        run: flutter clean
        shell: bash

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          pod install --repo-update || pod install
        shell: bash

      - name: Build iOS archive (No Codesign)
        run: flutter build ipa --release --no-codesign
        shell: bash

      - name: Check iOS bundle identifier
        run: |
          bundle_id="$(sed -n 's/.*PRODUCT_BUNDLE_IDENTIFIER = \(.*\);/\1/p' ios/Runner.xcodeproj/project.pbxproj | head -n 1)"
          echo "Using iOS bundle identifier: ${bundle_id}"
          {
            echo "## iOS build metadata"
            echo "- Bundle identifier: \`${bundle_id}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${bundle_id}" == com.example.* ]]; then
            echo "Error: The iOS bundle identifier is still the Flutter template default (${bundle_id})."
            exit 1
          fi
        shell: bash

      - name: Check generated archive exists
        run: |
          set -euo pipefail
          archive_app="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"

          if [ ! -d "$archive_app" ]; then
            echo "Error: Flutter did not generate ${archive_app}."
            exit 1
          fi
        shell: bash

      - name: Create nosign IPA from archive for sideload tools
        run: |
          set -euo pipefail
          ipa_name="Reporter_ios_${{ github.ref_name }}_nosign.ipa"
          archive_app="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"

          rm -rf Payload "$ipa_name"
          xattr -cr "$archive_app" 2>/dev/null || true

          mkdir -p Payload
          ditto "$archive_app" Payload/Runner.app
          xattr -cr Payload/Runner.app 2>/dev/null || true
          rm -rf Payload/Runner.app/_CodeSignature
          find Payload/Runner.app/Frameworks -name '_CodeSignature' -type d -prune -exec rm -rf {} +
          find Payload/Runner.app -name 'CodeResources' -type f -delete 2>/dev/null || true
          rm -f Payload/Runner.app/embedded.mobileprovision
          find Payload -name '.DS_Store' -delete 2>/dev/null || true
          find Payload -name '._*' -delete 2>/dev/null || true

          # Ensure required fields for Sideloadly are present in Info.plist
          /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 13.0" Payload/Runner.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :DTPlatformVersion string 17.5" Payload/Runner.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :DTPlatformName string iphoneos" Payload/Runner.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms array" Payload/Runner.app/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleSupportedPlatforms:0 string iPhoneOS" Payload/Runner.app/Info.plist 2>/dev/null || true

          # Create IPA with explicit options to avoid weird compression headers
          COPYFILE_DISABLE=1 zip -X -0 -y -r "$ipa_name" Payload
          rm -rf Payload

          if [ ! -f "$ipa_name" ]; then
            echo "Error: IPA file not created."
            exit 1
          fi

          echo "Nosign IPA created successfully."
          ls -lh "$ipa_name"
        shell: bash

      - name: Validate nosign IPA structure
        run: |
          set -euo pipefail
          ipa_name="Reporter_ios_${{ github.ref_name }}_nosign.ipa"
          extract_dir="$(mktemp -d)"

          trap 'rm -rf "${extract_dir}"' EXIT

          zipinfo -1 "$ipa_name" | grep -Fx "Payload/Runner.app/Info.plist" >/dev/null
          zipinfo -1 "$ipa_name" | grep -Fx "Payload/Runner.app/Runner" >/dev/null

          if zipinfo -1 "$ipa_name" | grep -Fx "Runner.app/Info.plist" >/dev/null; then
            echo "Error: IPA is missing the required Payload/ wrapper."
            exit 1
          fi

          if zipinfo -1 "$ipa_name" | grep -E '^(__MACOSX/|.*\/\._.*)$' >/dev/null; then
            echo "Error: IPA still contains macOS metadata files."
            exit 1
          fi

          if zipinfo -1 "$ipa_name" | grep -E '(^|/)(_CodeSignature/|CodeResources$|embedded\.mobileprovision$)' >/dev/null; then
            echo "Error: IPA still contains signing artifacts that should be removed before sideload re-signing."
            exit 1
          fi

          unzip -q "$ipa_name" -d "$extract_dir"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$extract_dir/Payload/Runner.app/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$extract_dir/Payload/Runner.app/Info.plist" >/dev/null
          /usr/libexec/PlistBuddy -c "Print :CFBundleSupportedPlatforms:0" "$extract_dir/Payload/Runner.app/Info.plist" >/dev/null

          if [ ! -e "$extract_dir/Payload/Runner.app/Frameworks/App.framework/App" ]; then
            echo "Error: App.framework/App is missing from the IPA."
            exit 1
          fi

          if [ ! -e "$extract_dir/Payload/Runner.app/Frameworks/Flutter.framework/Flutter" ]; then
            echo "Error: Flutter.framework/Flutter is missing from the IPA."
            exit 1
          fi
        shell: bash

      - name: Summarize iOS artifacts
        run: |
          set -euo pipefail

          {
            echo "## iOS artifacts"
            echo "- \`Reporter_ios_${{ github.ref_name }}_nosign.ipa\`: valid unsigned IPA for AltStore / Sideloadly style re-signing flows."
            echo "- This workflow does not perform iOS signing."
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios_outputs
          path: Reporter_ios_*.ipa

  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    needs: [flutter-build-android, flutter-build-ios]
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.apk
            ./artifacts/*.ipa
