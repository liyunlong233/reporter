name: "release"
on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  flutter-build-android:
    name: "Release for android"
    runs-on: "ubuntu-latest"
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --split-per-abi --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Reporter_android_${{ github.ref_name }}.apk

      - name: Upload android outputs
        uses: actions/upload-artifact@v4
        with:
          name: android_outputs
          path: Reporter_android_*.apk

  flutter-build-ios:
    name: "Release for iOS"
    runs-on: "macos-latest"
    permissions: write-all
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Build IPA (Unsigned)
        run: |
          flutter pub get
          flutter build ipa --release --no-codesign

      - name: Rename IPA
        run: |
          mv build/ios/ipa/*.ipa Reporter_ios_${{ github.ref_name }}_no_sign.ipa

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios_outputs
          path: Reporter_ios_*.ipa

  release:
    name: "Create GitHub Release"
    runs-on: "ubuntu-latest"
    needs: [flutter-build-android, flutter-build-ios] 
    permissions: write-all
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*.apk
            ./artifacts/*.ipa
